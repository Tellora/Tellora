name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main            # Triggers on every push to the main branch
  workflow_dispatch:    # Allows manual trigger from the GitHub Actions UI

# Sets permissions so the workflow can push to the gh-pages branch
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; skip queued runs but DO NOT cancel in-progress ones
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NODE_ENV: production

      # next build with output:"export" writes files to ./out
      - name: Add .nojekyll to prevent Jekyll processing
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out   # The static export directory

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
